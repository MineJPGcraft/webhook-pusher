#  Webhook Pusher 配置文件

# 服务配置
server:
  host: "0.0.0.0"
  port: 8000

# 认证配置
# 客户端调用 webhook 时需在 Authorization 头中携带此 token
# 格式: Authorization: Bearer <token>
auth:
  tokens:
    - "your-secret-token-here"   # 可配置多个 token

# 邮件 (SMTP) 配置
email:
  enabled: true
  smtp_host: "smtp.example.com"   # SMTP 服务器地址
  smtp_port: 465                  # SMTP 端口 (SSL: 465, STARTTLS: 587)
  use_ssl: true                   # 是否使用 SSL
  use_starttls: false             # 是否使用 STARTTLS (与 SSL 互斥)
  username: "user@example.com"    # SMTP 用户名
  password: "your-app-password"   # SMTP 密码 / 应用专用密码
  sender: "user@example.com"      # 默认发件人地址
  sender_name: "Webhook Pusher"   # 发件人显示名称

# Telegram 配置
# 获取 Bot Token: 在 Telegram 中搜索 @BotFather，创建 Bot 后获取
# 获取 chat_id:  与你的 Bot 对话后访问 https://api.telegram.org/bot<token>/getUpdates
telegram:
  enabled: false
  bot_token: ""                   # 从 @BotFather 获取的 Bot Token
  parse_mode: "HTML"              # 消息解析模式: "HTML" / "MarkdownV2" / "" (纯文本)
  # api_base: "https://api.telegram.org"  # 可自定义地址 (国内无法直连时使用)
  # timeout: 30.0                          # HTTP 请求超时 (秒)

# Discord 配置 (预留)
discord:
  enabled: false
  webhook_urls: []
  # 也可在 webhook 调用时传参
